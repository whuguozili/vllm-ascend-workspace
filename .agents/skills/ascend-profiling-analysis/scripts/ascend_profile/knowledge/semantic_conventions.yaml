version: 1

# Stable enumerations used across CSV / JSON artifacts in this skill.
#
# Source of truth for these enums lives in Python today
# (``common.py:categories_and_roles``, ``classify.py:decompose_layer_into_blocks``,
# ``cross_rank.py``, ``diagnostics.py``). This YAML is the *contract* layer:
# adding a new value here is the first step before extending Python so that
# downstream readers (HTML report, schema tests, agent prompts) all agree.
#
# Test ``tests/test_semantic_conventions.py`` verifies that any value
# emitted by the pipeline is listed here.

attributes:
  op_type:
    description: |
      Coarse accelerator-core classification for a kernel event.
      Derived from ``kernel_details.csv`` column ``Accelerator Core`` plus
      the kernel name (for ``mix_*`` fused kernels).
    type: enum
    values:
      - aic                    # AI Cube only
      - aiv                    # AI Vector only
      - mix_cv                 # Cube + Vector fused on the same kernel (e.g. FIA, GroupedMatmul)
      - mix_comm_aiv           # Communication + Vector fused (e.g. DispatchFFNCombine)
      - communication          # HCCL / hcom collective or point-to-point
      - aicpu                  # AICPU core (still device-side; counted as busy time)
      - dsa                    # Data Stream Accelerator (memcpy, transpose, etc.)
      - unknown

  op_roles:
    description: |
      Functional roles attached to a kernel after taxonomy matching. A
      single kernel may have multiple roles (multi-valued enum).
    type: enum
    multi: true
    values:
      - attention
      - attention_aux              # SFA / MLA companion: indexer, KV cache write, RoPE, V-up-proj
      - moe
      - ffn
      - compute
      - communication
      - normalization
      - block_head
      - quant
      - selection
      - sampling
      - aicpu
      - dummy_or_reduced_work
      - matmul
      - linear_attention
      - mamba
      - compute_other

  op_categories:
    description: |
      Fine-grained categories used by the rule matcher (multi-valued).
      Categories are namespaced ``domain.subkind`` and are **kernel-level
      neutral** — the same kernel category can serve multiple paper
      architectures. The architecture-level paper name (mla / dsa / csa /
      hca / gqa) is resolved separately, see ``attention_family`` below.
      Provenance lives in ``knowledge/kernel_signatures.yaml`` (per-kernel
      ``evidence: path:line``) and the family-resolution combinations in
      ``knowledge/attention_families.yaml``.
    type: enum
    multi: true
    values:
      # --- attention: dense GQA / MHA / generic
      - attention.gqa_or_mha
      - attention.generic
      # --- attention: MLA preprocessing (V2/V3, also reused by DSA in V3.2)
      - attention.mla
      - attention.mla.preprocess
      - attention.mla.kv_norm_rope_cache
      - attention.mla.v_up_proj
      # --- attention: sparse-attention building blocks
      #     Neutral names. Used by both DSA (V3.2) and CSA (V4). The CANN
      #     backend implementing them is ``AscendSFAImpl`` (sfa_v1.py).
      #     Family resolution (csa / dsa / hca) lives in
      #     attention_families.yaml — never bake the paper name into the
      #     kernel category.
      - attention.sparse_sharedkv
      - attention.sparse_sharedkv.metadata
      - attention.lightning_indexer
      - attention.kv_compressor
      - attention.sparse_attn.v_up_proj
      # --- attention: KVComp overlay (decode-only Hamming-distance pruning)
      - attention.kvcomp
      - attention.kvcomp.topk
      - attention.kvcomp.signpack
      - attention.kvcomp.cache_write
      # --- attention: linear / mamba / GDN
      - attention.linear_or_mamba
      # --- attention: RoPE companions
      - attention.rope
      - attention.rope.interleave
      - attention.rope.partial
      - attention.rope.indexed
      # --- MoE
      - moe.gating
      - moe.dispatch
      - moe.combine
      - moe.dispatch_expert_compute
      - moe.expert_matmul
      # --- compute / quant
      - compute.matmul
      - compute.aux
      - compute.norm
      - normalization
      - quant.dynamic
      - quant.mx
      - quant.matmul
      # --- communication
      - communication.collective
      - communication.allreduce
      - communication.allgather
      - communication.reducescatter
      - communication.alltoallv
      - communication.point_to_point
      # --- system / heuristic
      - block_head
      - block_head.mhc_prefix
      - sampling_or_selection
      - sampling.argmax
      - sampling.top_k_top_p
      - aicpu
      - dummy_or_reduced_work

  attention_family:
    description: |
      Single paper-aligned label assigned to each attention block by
      ``html_report.detect_attention_subtype``. Used for the L2 block
      header. NOT used by the segmenter.

      Names follow the DeepSeek papers, not the CANN / vllm-ascend
      backend class. (DSA and CSA both route through AscendSFABackend
      on Ascend, but they are different paper architectures.)
    type: enum
    values:
      - csa                        # DeepSeek V4: Compressed Sparse Attention (main layers)
      - hca                        # DeepSeek V4: Heavily Compressed Attention (alternating)
      - dsa                        # DeepSeek V3.2: DeepSeek Sparse Attention (arxiv 2512.02556)
      - mla                        # DeepSeek V2 / V3: Multi-head Latent Attention
      - gqa                        # dense GQA / MHA via FIA (Llama / Qwen / Mistral …)
      - fa                         # generic FlashAttention path
      - linear                     # Mamba / GDN / linear attention
      - attn                       # unknown / unclassified
    suffix:
      "+kvc": "KVComp (Hamming-distance KV pruning) overlay active"

  bound_family:
    description: |
      Pipeline stage on which a kernel spends the most time
      (decoupled Cube / Vector aware).
    type: enum
    values:
      - mac                    # Cube MAC compute
      - fixpipe                # Cube fixpipe (DMA from L1/L0C out)
      - mte1                   # Cube L1 -> L0A/L0B
      - mte2                   # L1 -> UB or scalar -> UB load
      - mte3                   # UB -> L1 / Out
      - vec                    # AI Vector compute
      - scalar
      - communication
      - aicpu
      - unknown

  block_kind:
    description: |
      The block-level decomposition emitted by
      ``classify.decompose_layer_into_blocks``.
    type: enum
    values:
      - attention
      - ffn
      - moe
      - aicpu                  # AICPU companion / sampling-only blocks
      - other

  finding_type:
    description: |
      Stable identifier for entries inside ``diagnosis_findings.json``.
      Adding a new finding requires (a) adding an enum value here,
      (b) emitting it from ``diagnostics.py``, (c) keeping the new
      finding evidence-chained (``evidence_ids`` or ``alignment_ids``
      or non-empty ``limitations``).
    type: enum
    values:
      - communication_collective_slow
      - ep_load_imbalance_suspected
      - slow_rank_suspected
      - dp_workload_imbalance
      - reduced_work_or_dummy_rank
      - rank_workload_asymmetry
      - device_idle_bubble
      - aicpu_exposed
      - wait_anchor_false_hotspot

  alignment_method:
    description: |
      How a ``cross_rank_alignment.csv`` row was produced.
      Versioned identifiers so future algorithm changes can coexist.
    type: enum
    values:
      - step_time_overlap_v1
      - time_bucket_v1

  alignment_confidence:
    description: |
      Per-row confidence of cross-rank alignment.
    type: enum
    values:
      - high                   # exact class signature match across all ranks
      - medium                 # class match but with partial coverage / fallback
      - low                    # heuristic / row-range overlap only

  html_status:
    description: |
      Reported in ``report/manifest.json`` to signal whether the
      L1/L2/L3 HTML view rendered successfully.
    type: enum
    values:
      - ok
      - skipped                # --skip-html
      - stub                   # report_mode=summary left HTML out by design
      - error                  # rendering raised; placeholder html written

  report_mode:
    description: |
      ``--report-mode`` selection forwarded to the report stage.

      Only two modes survive in production:

      * ``full-raw`` — default; render the complete L1/L2/L3 HTML with
        operator cards backed by raw ``kernel_details`` rows. This is
        the canonical analysis output.
      * ``summary`` — md + xlsx only; HTML is a stub. Used to shorten
        the feedback loop while debugging the pipeline (segment /
        classify / summarize / cross_rank); not a deliverable mode.

      A prior ``interactive`` mode (HTML without raw kernel rows) was
      removed because the operator cards lost their core value when
      raw rows were stripped.
    type: enum
    values:
      - summary
      - full-raw
