version: 1

# ----------------------------------------------------------------------------
# Model architectures — HuggingFace arch → (attention family, FFN family)
# ----------------------------------------------------------------------------
# This file is a *report-time annotation layer*. The analyser does NOT use
# it to drive segmentation or detection — those go through kernel/family
# signatures (see attention_families.yaml and moe_families.yaml).
#
# Use cases:
#   - Sanity check: when the user provides `--model-id <name>` via manifest,
#     diagnose flags a mismatch (e.g. profile shows sparse-attention
#     signatures — kv_compressor / lightning_indexer / sparse_sharedkv —
#     but the model is registered as MLA-only).
#   - Report annotation: HTML report names the architecture when it can
#     infer it, otherwise leaves the field blank.
#
# References:
#   - vllm/vllm/model_executor/models/registry.py (_VLLM_MODELS)
#   - knowledge/attention_families.yaml
#   - knowledge/moe_families.yaml

schema_notes:
  family_resolution: |
    Each entry binds an HF architecture name to one attention family AND
    one FFN family. When a checkpoint can use multiple paths (e.g.
    GlmMoeDsa is MLA without index_topk and SFA with it), list both
    candidate families in ``attention_candidates``.
  hf_config_signals: |
    The minimal set of HF config fields the analyser would need to read
    to disambiguate. Listed for documentation only; runtime field reading
    is not implemented yet (see references/deferred-work.md).
  block_pattern: |
    Coarse layer composition expected in a normal forward. The analyser
    cross-checks the observed block_kind sequence against this to flag
    surprises (e.g. expected ``[attention, moe]`` but observed
    ``[attention, ffn]``).

# ----------------------------------------------------------------------------
# Families (the LHS of the mapping)
# ----------------------------------------------------------------------------
architectures:

  # ============================== DeepSeek =================================

  DeepseekV2ForCausalLM:
    attention: mla
    ffn: mc2                 # MoE
    hf_config_signals: [kv_lora_rank, qk_rope_head_dim, num_experts]
    block_pattern: [attention, moe]
    notes: |
      Classic MLA + MoE. No sparse-attention kernels expected. If the
      trace shows ``attention.lightning_indexer`` or
      ``attention.sparse_sharedkv`` for a V2 / V3 checkpoint, the
      analyser has misclassified the kernel set.

  DeepseekV3ForCausalLM:
    attention: mla
    ffn: mc2
    hf_config_signals: [kv_lora_rank, qk_rope_head_dim, num_experts]
    block_pattern: [attention, moe]

  DeepseekV32ForCausalLM:
    attention: dsa                # paper: DeepSeek Sparse Attention (arxiv 2512.02556)
    ffn: mc2
    hf_config_signals: [kv_lora_rank, qk_rope_head_dim, index_topk, index_n_heads, index_head_dim]
    block_pattern: [attention, moe]
    notes: |
      V3.2 introduces DSA. DSA = Lightning Indexer + fine-grained
      top-k token selection built on top of MLA (MQA mode). Profile
      signature: ``attention.lightning_indexer`` + ``attention.sparse_sharedkv``
      with NO ``attention.kv_compressor``. CANN backend is the same
      AscendSFAImpl as V4, but the architecture per paper is DSA.

  DeepseekV4ForCausalLM:
    attention: csa_hca_hybrid     # paper: CSA + HCA alternating
    ffn: mc2
    hf_config_signals: [kv_lora_rank, qk_rope_head_dim, index_topk]
    block_pattern: [attention, moe]
    notes: |
      V4 alternates two attention kinds layer-by-layer:
        * CSA (Compressed Sparse Attention): 4x KV compression +
          Lightning Indexer + sparse attention with sliding window.
          Profile signature: ``attention.kv_compressor`` AND
          ``attention.lightning_indexer`` AND
          ``attention.sparse_sharedkv``.
        * HCA (Heavily Compressed Attention): 128x KV compression +
          dense FIA attention. Profile signature:
          ``attention.kv_compressor`` AND ``attention.gqa_or_mha``,
          without indexer/sparse-sharedkv. **Detection is heuristic.**
      Both share the AscendSFAImpl backend.

  DeepseekForCausalLM:
    attention: mla
    ffn: dense_swiglu
    notes: V1 dense; rare in modern deployments.

  LongcatFlashForCausalLM:
    attention: mla
    ffn: mc2

  GlmMoeDsaForCausalLM:
    attention_candidates: [mla, sfa]
    ffn: mc2
    hf_config_signals: [index_topk]
    notes: |
      "DSA" in the HF arch name is a marketing label (DeepSeek Sparse
      Attention) and is unrelated to the op_type ``dsa`` (Data Stream
      Accelerator). Implementation inherits DeepseekV2ForCausalLM and
      becomes SFA when ``index_topk`` is set in the config.

  MiniCPM3ForCausalLM:
    attention: mla
    ffn: dense_swiglu

  # ============================== Llama / Mistral / Qwen ===================

  LlamaForCausalLM:
    attention: dense
    ffn: dense_swiglu
    hf_config_signals: [num_attention_heads, num_key_value_heads, hidden_size]
    block_pattern: [attention, ffn]
    notes: |
      Llama-1 was MHA; from Llama-2 onwards mostly GQA. Disambiguation
      requires shape inspection (deferred).

  MistralForCausalLM:
    attention: dense
    ffn: dense_swiglu

  Qwen2ForCausalLM:
    attention: dense
    ffn: dense_swiglu

  Qwen3ForCausalLM:
    attention: dense
    ffn: dense_swiglu
    notes: QK norm in attention; same broad kernel mix as Qwen2.

  Qwen2MoeForCausalLM:
    attention: dense
    ffn: mc2
    block_pattern: [attention, moe]

  Qwen3MoeForCausalLM:
    attention: dense
    ffn: mc2
    block_pattern: [attention, moe]

  Qwen3NextForCausalLM:
    attention: hybrid                 # full_attention OR linear_attention per layer
    ffn: hybrid                       # dense OR moe per layer
    hf_config_signals: [layer_types, decoder_sparse_step, num_experts]
    block_pattern: [attention | linear, ffn | moe]
    notes: |
      Per-layer mix; the analyser must NOT assume a single family for
      the whole step.

  MixtralForCausalLM:
    attention: dense
    ffn: mc2

  PhimoeForCausalLM:
    attention: dense
    ffn: mc2

  Phi3ForCausalLM:
    attention: dense
    ffn: dense_swiglu

  # ============================== Gemma / GPT / Bloom ======================

  Gemma2ForCausalLM:
    attention: dense                  # GQA, half the layers use sliding window
    ffn: dense_swiglu
    notes: per-layer sliding window via layer_types; treated as dense.

  Gemma3ForCausalLM:
    attention: dense
    ffn: dense_swiglu

  GPT2LMHeadModel:
    attention: dense                  # MHA
    ffn: dense_gelu

  BloomForCausalLM:
    attention: dense                  # MHA with ALiBi
    ffn: dense_gelu

  GptOssForCausalLM:
    attention: dense                  # GQA + attention sinks + sliding
    ffn: mc2

  # ============================== Linear / Mamba / Hybrid ==================

  Mamba2ForCausalLM:
    attention: linear_attention       # SSM, IsAttentionFree
    ffn: dense_swiglu                 # nominal; not transformer FFN
    block_pattern: [attention]

  MambaForCausalLM:
    attention: linear_attention
    ffn: dense_swiglu

  FalconMambaForCausalLM:
    attention: linear_attention
    ffn: dense_swiglu

  MiniMaxText01ForCausalLM:
    attention: linear_attention
    ffn: mc2

  JambaForCausalLM:
    attention: hybrid                 # attention + mamba per layer
    ffn: hybrid

  KimiLinearForCausalLM:
    attention: hybrid                 # MLA + KimiDeltaAttention
    ffn: mc2

  BailingMoeV2_5ForCausalLM:
    attention: hybrid                 # MLA + linear per layer
    ffn: mc2

  # ============================== Other MoE ================================

  DbrxForCausalLM:
    attention: dense
    ffn: mc2

  OlmoeForCausalLM:
    attention: dense
    ffn: mc2

  Ernie4_5_MoeForCausalLM:
    attention: dense
    ffn: mc2

  SarvamMLAForCausalLM:
    attention: mla
    ffn: dense_swiglu

  SarvamMoEForCausalLM:
    attention: mla
    ffn: mc2

  AXK1ForCausalLM:
    attention: mla
    ffn: mc2

  # ============================== Dense legacy =============================

  ChatGLMModel:
    attention: dense
    ffn: dense_swiglu

  BaiChuanForCausalLM:
    attention: dense
    ffn: dense_swiglu

  InternLMForCausalLM:
    attention: dense
    ffn: dense_swiglu

  # ============================== Fallback =================================

  TransformersForCausalLM:
    attention: unknown
    ffn: unknown
    notes: |
      Delegates to HuggingFace model definition. The analyser must
      infer from trace kernels only; do not consult this table.

# ----------------------------------------------------------------------------
# Diagnosis hooks (what the analyser is allowed to do with this table)
# ----------------------------------------------------------------------------
diagnosis_uses:
  - |
    When manifest.json carries ``model_id`` resolvable to one of the
    architectures above, compare the observed attention family against
    the expected one. Mismatch → diagnostic finding
    ``attention_family_mismatch``.
  - |
    When the observed block_pattern differs from the documented one,
    emit a low-severity ``block_pattern_unexpected`` finding (e.g.
    expected attention+moe but saw attention+ffn → check if a
    speculative-decoding or companion layer slipped in).

non_goals:
  - |
    Do NOT use ``num_hidden_layers`` from this table to drive segment
    cutting. The segmenter uses pure structural signatures (see
    block_taxonomy.md).
  - |
    Do NOT guess the model from layer count or kernel mix alone — that
    is what the report's structure fingerprint is for, and that lives
    in html_report.guess_model_structure (UI-only).
