version: 1

# ----------------------------------------------------------------------------
# Kernel signature inventory
# ----------------------------------------------------------------------------
# Map from "kernel name in kernel_details.csv (Name column, after
# common.fold_text)" to the *category labels* this skill emits in
# op_categories. Categories are deliberately **neutral**: the same kernel
# can serve more than one architecture (e.g. the Compressor kernel runs in
# both V4 CSA and V4 HCA layers), and the architecture family is decided
# downstream from the *combination* of category signatures, not from any
# single kernel name.
#
# Naming policy:
#   * Architecture/paper names (mla / dsa / csa / hca / gqa) are only used
#     at the family-resolution layer (see attention_families.yaml and
#     html_report.detect_attention_subtype).
#   * Kernel categories below are descriptive: ``attention.kv_compressor``,
#     ``attention.lightning_indexer``, ``attention.sparse_sharedkv`` — they
#     describe what the kernel does on Ascend, not which paper it came from.
#   * CANN / vllm-ascend backend names (``AscendSFAImpl``, ``AscendMLAImpl``)
#     are documented as evidence but never used as op_categories values.
#
# Each entry carries an ``evidence`` field with ``path:line``; if evidence
# lives outside this repo (closed-source CANN op, paper), we say so.

schema_notes:
  folding: |
    Profile names are folded via common.fold_text before matching: lowercase,
    drop "aclnn"/"aclop"/"kernel"/"infer" prefixes/suffixes and trailing
    "_<digits>". So "aclnnLightningIndexerQuant" reduces to
    "lightningindexerquant".
  conflict_resolution: |
    When more than one rule matches a name, all matching categories are
    added — the kernel may legitimately span multiple roles (e.g. fused
    MoE compute + collective communication). Family resolution operates on
    the *set* of categories present in a block, not on a single kernel.

# ----------------------------------------------------------------------------
# Attention kernels
# ----------------------------------------------------------------------------
kernels:

  # ---- Dense attention (GQA / MHA): shared by MLA decode, DSA / CSA fallback,
  #      and the plain AscendAttentionBackend.
  - profile_name: fusedinferattentionscore
    aliases: [fusedinferattentionscorev2, fia, fiav2]
    python_entry: torch_npu.npu_fused_infer_attention_score[_v2]
    categories: [attention.gqa_or_mha]
    roles: [attention]
    used_by_family: [mla, dsa, hca, gqa]
    evidence:
      - "vllm-ascend/vllm_ascend/attention/attention_v1.py — dense path"
      - "vllm-ascend/vllm_ascend/attention/mla_v1.py:1524 — MLA decode score"

  - profile_name: unpadflashattention
    aliases: [flashattention, flashattentionscore]
    python_entry: torch_npu.npu_flash_attention*
    categories: [attention.gqa_or_mha]
    roles: [attention]
    used_by_family: [gqa, fa]
    evidence:
      - "vllm-ascend/vllm_ascend/attention/attention_v1.py — long-context / prefill"

  # ---- MLA (DeepSeek V2 / V3, also reused by DSA in V3.2 paper section 4.x)
  #      CANN canonical op names (per the CANN op_list and the PR that added
  #      the vllm-ascend custom kernel):
  #        - ``mla_prolog`` / ``MlaProlog``           (CANN aclnn op, AI Core)
  #        - ``mla_prolog_v2`` / ``MlaPrologV2WeightNz`` (newer variant)
  #        - ``mla_preprocess`` / ``MlaPreprocess``   (vllm-ascend custom kernel
  #                                                    added in PR #3226)
  #      All three names are accepted by the rule list.
  - profile_name: mlapreprocess
    aliases:
      - mlaprolog
      - mlaprologv2
      - mlaprologweightnz
      - mlapo
    python_entry: |
      torch.ops._C_ascend.mla_preprocess  (vllm-ascend custom)
      torch_npu.npu_mla_prolog / npu_mla_prolog_v2  (CANN)
    categories: [attention.mla, attention.mla.preprocess]
    roles: [attention]
    used_by_family: [mla, dsa]
    evidence:
      - "vllm-ascend/vllm_ascend/attention/sfa_v1.py:877 — MLAPO entry"
      - "vllm-ascend/vllm_ascend/device/device_op.py:249"
      - "CANN docs op_list.md — mla_prolog / mla_prolog_v2 inference ops"
      - "vllm-ascend PR #3226 — added the mla_preprocess kernel"
    notes: |
      Fuses qkv_a_proj + layernorm + q_b_proj + RoPE + KV-cache write.
      Triggered on quantised-W8A8 inputs with ≤1024 query tokens. DSA
      (V3.2 paper §4) explicitly builds on MLA, so DSA layers carry the
      same MLA preprocess kernels alongside the sparse signatures.

  - profile_name: transposebatchmatmul
    aliases: [transposequantbatchmatmul]
    python_entry: torch_npu.npu_transpose_batchmatmul
    categories: [attention.mla.v_up_proj, compute.matmul]
    roles: [attention]
    used_by_family: [mla, dsa]
    evidence:
      - "vllm-ascend/vllm_ascend/attention/mla_v1.py:893 — V_up_proj"
    notes: |
      MLA V up-projection BMM with implicit output transpose. Also reused
      by the DSA path in V3.2 because DSA inherits MLA's V folding.

  - profile_name: batchmatmultranspose
    python_entry: torch.ops._C_ascend.batch_matmul_transpose
    categories: [attention.sparse_attn.v_up_proj, compute.matmul]
    roles: [attention]
    used_by_family: [dsa, csa]
    evidence:
      - "vllm-ascend/vllm_ascend/attention/sfa_v1.py:841 — V_up_proj ≤1024 tokens"
    notes: |
      Custom Ascend-C kernel inside the SFA backend. Distinct from
      MLA's TransposeBatchMatmul above.

  # ---- Sparse-attention building blocks: shared by DSA (V3.2) and CSA (V4).
  - profile_name: kvquantsparseattnsharedkv
    aliases: [sparseattnsharedkv, sparseattentionsharedkv, sharedkv]
    python_entry: torch.ops._C_ascend.npu_sparse_flash_attention
    categories: [attention.sparse_sharedkv]
    roles: [attention]
    used_by_family: [dsa, csa]
    evidence:
      - "vllm-ascend/vllm_ascend/attention/sfa_v1.py:1064"
    notes: |
      Main sparse attention kernel. Used by both DSA (V3.2) and CSA (V4)
      layers — the architecture family is resolved by whether a
      Compressor kernel is also present (CSA) or not (DSA).

  - profile_name: kvquantsparseattnsharedkvmetadata
    aliases: [sparseattnsharedkvmetadata]
    python_entry: (sub-kernel of npu_sparse_flash_attention)
    categories: [attention.sparse_sharedkv.metadata]
    roles: [attention_aux]
    used_by_family: [dsa, csa]
    evidence:
      - "appears alongside KVQuantSparseAttnSharedKV in profile traces"

  - profile_name: lightningindexer
    aliases: [quantlightningindexer, indexercompressepilog, indexercompressepilogv2]
    python_entry: |
      torch.ops._C_ascend.npu_lightning_indexer[_quant] |
      torch_npu.npu_lightning_indexer
    categories: [attention.lightning_indexer]
    roles: [attention_aux]
    used_by_family: [dsa, csa]
    evidence:
      - "vllm-ascend/vllm_ascend/attention/sfa_v1.py:993 (quant variant)"
      - "vllm-ascend/vllm_ascend/attention/sfa_v1.py:1023 (default)"
    notes: |
      Top-k token (DSA) or top-k compressed-block (CSA) selector. Present
      in both V3.2 DSA and V4 CSA. Not present in V4 HCA (dense path) or
      V2/V3 MLA.

  - profile_name: quantlightningindexermetadata
    aliases: [lightningindexermetadata]
    python_entry: (sub-kernel of npu_lightning_indexer)
    categories: [attention.lightning_indexer]
    roles: [attention_aux]
    used_by_family: [dsa, csa]
    evidence: missing

  # ---- KV compression (V4-only): present in CSA and HCA layers, NOT in DSA.
  - profile_name: compressor
    python_entry: (sub-kernel of npu_sparse_flash_attention with KV-compression enabled)
    categories: [attention.kv_compressor]
    roles: [attention_aux]
    used_by_family: [csa, hca]
    evidence: missing
    notes: |
      Performs the 4x (CSA) or 128x (HCA per DSV4 paper) block-level KV
      compression. Sub-kernel internal to the SFA fused op; no separate
      Python call site in vllm-ascend. Absence of this kernel inside a
      sparse-attention layer is the discriminator between V3.2 DSA
      (no compressor) and V4 CSA (has compressor).

  - profile_name: kvcompressepilog
    aliases: [kvcompressepilogue]
    python_entry: (sub-kernel)
    categories: [attention.kv_compressor]
    roles: [attention_aux]
    used_by_family: [csa, hca]
    evidence: missing

  # ---- KV-compressed decode augmentation (Hamming-distance KV pruning).
  - profile_name: hammingdisttopk
    aliases: [npuhammingdisttopk]
    python_entry: torch.ops._C_ascend.npu_hamming_dist_top_k
    categories: [attention.kvcomp, attention.kvcomp.topk]
    roles: [attention_aux]
    used_by_family: [overlay]
    evidence:
      - "vllm-ascend/vllm_ascend/attention/kvcomp_attn/attention_utils.py:123"

  - profile_name: signbitspack
    aliases: [npusignbitspack]
    python_entry: torch.ops._C_ascend.npu_sign_bits_pack
    categories: [attention.kvcomp.signpack]
    roles: [attention_aux]
    used_by_family: [overlay]
    evidence:
      - "vllm-ascend/vllm_ascend/worker/kvcomp_utils.py:452"

  - profile_name: reshapeandcachebnsd
    aliases: [npureshapeandcachebnsd]
    python_entry: torch.ops._C_ascend.npu_reshape_and_cache_bnsd
    categories: [attention.kvcomp.cache_write]
    roles: [attention_aux]
    used_by_family: [overlay]
    evidence:
      - "vllm-ascend/vllm_ascend/attention/kvcomp_attn/attention_utils.py:87"

  # ---- Linear / Mamba / GatedDeltaNet
  - profile_name: causalconv1d
    aliases: [causalconv]
    python_entry: torch.ops.* (various Mamba/GDN backends)
    categories: [attention.linear_or_mamba]
    roles: [attention]
    used_by_family: [linear]
    evidence:
      - "common.py — preserved substring rule"

  - profile_name: mamba
    aliases: [deltanet, gdn]
    python_entry: various
    categories: [attention.linear_or_mamba]
    roles: [attention]
    used_by_family: [linear]

