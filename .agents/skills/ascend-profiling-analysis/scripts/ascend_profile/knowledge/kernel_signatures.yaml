# ----------------------------------------------------------------------------
# Deprecations (kept for one release so artifact consumers can migrate)
# ----------------------------------------------------------------------------
deprecated_categories:
  # Earlier drafts used "attention.csa*" as the catch-all name and later
  # tried "attention.sfa*" after a wrong subagent reading. Neither is
  # used now — sparse-attention kernels live under neutral names
  # (attention.sparse_sharedkv, attention.lightning_indexer,
  # attention.kv_compressor) and the architecture family (csa / dsa /
  # hca / mla) is resolved at the report layer.
  attention.csa:            attention.sparse_sharedkv
  attention.csa.compressor: attention.kv_compressor
  attention.csa.indexer:    attention.lightning_indexer
  attention.csa.metadata:   attention.sparse_sharedkv.metadata
  attention.sfa:            attention.sparse_sharedkv
  attention.sfa.compressor: attention.kv_compressor
  attention.sfa.indexer:    attention.lightning_indexer
  attention.sfa.metadata:   attention.sparse_sharedkv.metadata
  attention.sfa.v_up_proj:  attention.sparse_attn.v_up_proj
