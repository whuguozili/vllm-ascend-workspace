# ----------------------------------------------------------------------------
# Block-head structural prefix kernels (NOT specific to attention OR MoE)
# ----------------------------------------------------------------------------
# Kernels with the ``hc`` / ``mhc`` prefix (e.g. ``HCPreSinkhorn``,
# ``HCPreInvRMS``, ``HCPost``, ``MhcRmsNorm``) are structural block-head
# normalisation helpers. **They appear before BOTH attention layers and
# MoE routing blocks** in real DSV4 prefill traces. We do not assign them
# a MoE-only or attention-only family; they stay under
# ``block_head.mhc_prefix`` as a structural marker only.

  - profile_name: hcprefix_blockhead
    aliases: [hcpresinkhorn, hcpreinvrms, hcpost, mhcrmsnorm, mhcaddrmsnorm]
    python_entry: |
      various — appear as the leading helper kernel before both
      attention and MoE blocks; some are sub-kernels of fused CANN ops
      (e.g. moe_gating_top_k internals) and some are stand-alone norms.
    categories: [block_head.mhc_prefix]
    roles: [block_head]
    used_by_family: [structural]
    evidence:
      - "DSV4 prefill profile: HCPreSinkhorn / HCPreInvRMS / HCPost appear
        in both attention prologue and MoE routing prologue layers"
    notes: |
      Earlier drafts of this skill tried to push the HC* family under
      ``moe.gating`` (based on the assumption that they were internal to
      ``moe_gating_top_k``). That broke layers where the same prefix
      precedes attention. The block_head label is the safe, paper-neutral
      home — downstream consumers that need to know which block the
      prefix belongs to should look at the immediately following kernel.

