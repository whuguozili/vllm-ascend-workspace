version: 1

# ----------------------------------------------------------------------------
# MoE / FFN family detection
# ----------------------------------------------------------------------------
# Mirrors attention_families.yaml: each family is keyed on the kernels that
# show up in the profile and cross-referenced to its vllm-ascend dispatch
# path. Names come from the implementation (token_dispatcher.py,
# moe_comm_method.py, ops/fused_moe/...), not from papers.

families:

  # ------------------------------------------------------------------------
  # 1. MC2 — All-to-All expert parallel with separate dispatch / GMM / combine
  # ------------------------------------------------------------------------
  mc2:
    ascend_class: MoEAlltoAllvTokenDispatcher
    ascend_module: vllm-ascend/vllm_ascend/ops/fused_moe/token_dispatcher.py
    discriminator: |
      Default MoE path when expert-parallel is enabled and the fused
      MC2 op (dispatch_ffn_combine) is NOT selected. The token
      dispatcher splits the pipeline into dispatch → GMM(gate/up) →
      SwiGLU → GMM(down) → combine, each visible as its own kernel.
    must_have:
      - [moe.gating]
      - [moe.dispatch]
      - [moe.combine]
      - [moe.expert_matmul]
    typical_companions:
      - communication.alltoallv     # all-to-all between dispatch / combine
      - quant.dynamic               # token quantisation before GMM
    used_by_hf_arch:
      - Qwen2MoeForCausalLM
      - Qwen3MoeForCausalLM
      - DeepseekV2ForCausalLM       # when fused MC2 disabled
      - DeepseekV3ForCausalLM
      - DeepseekV32ForCausalLM
      - DeepseekV4ForCausalLM
      - MixtralForCausalLM
      - PhimoeForCausalLM
      - DbrxForCausalLM
      - OlmoeForCausalLM
      - GptOssForCausalLM
    evidence:
      - "vllm-ascend/vllm_ascend/ops/fused_moe/token_dispatcher.py:223 npu_moe_distribute_dispatch_v2"
      - "vllm-ascend/vllm_ascend/ops/fused_moe/token_dispatcher.py:321 npu_moe_distribute_combine_v2"
      - "vllm-ascend/vllm_ascend/device/device_op.py:80 moe_gating_top_k"

  # ------------------------------------------------------------------------
  # 2. Fused MC2 — dispatch + GMM + combine in a single Ascend custom op
  # ------------------------------------------------------------------------
  fused_mc2:
    ascend_class: AlltoAllCommImpl
    ascend_module: vllm-ascend/vllm_ascend/ops/fused_moe/moe_comm_method.py
    discriminator: |
      Enabled when ``VLLM_ASCEND_FUSED_MC2 != 0``. The whole MoE step
      collapses into one kernel; the discrete dispatch / GMM / combine
      categories vanish from the trace.
    must_have:
      - [moe.gating]
      - [moe.dispatch_expert_compute]   # DispatchFfnCombine OR DispatchGmmCombineDecode
    must_not_have:
      - moe.dispatch                    # would mean the un-fused path is also active (rare)
      - moe.combine
    variants:
      prefill: DispatchFfnCombine
      decode:  DispatchGmmCombineDecode
    used_by_hf_arch: same set as mc2; gated by env var, not by HF arch
    evidence:
      - "vllm-ascend/vllm_ascend/ops/fused_moe/moe_comm_method.py:283 dispatch_ffn_combine"
      - "vllm-ascend/vllm_ascend/ops/fused_moe/moe_comm_method.py:302 dispatch_gmm_combine_decode"

  # ------------------------------------------------------------------------
  # 3. Dense FFN (SwiGLU / GeLU)
  # ------------------------------------------------------------------------
  dense_swiglu:
    ascend_class: (LlamaMLP / Qwen2MLP / etc. — no special wrapper)
    ascend_module: vllm/vllm/model_executor/models/<family>.py
    must_have:
      - [compute.matmul]              # gate_up_proj + down_proj
    must_not_have:
      - moe.gating
      - moe.dispatch
      - moe.dispatch_expert_compute
    typical_companions:
      - normalization
      - quant.dynamic
    used_by_hf_arch:
      - LlamaForCausalLM
      - Qwen2ForCausalLM
      - Qwen3ForCausalLM
      - MistralForCausalLM
      - InternLMForCausalLM
      - BaiChuanForCausalLM
      - Phi3ForCausalLM
      - MiniCPM3ForCausalLM
      - Gemma2ForCausalLM
      - Gemma3ForCausalLM
      - Ernie4_5ForCausalLM
      - SarvamMLAForCausalLM            # dense FFN despite MLA attention

  dense_gelu:
    ascend_class: (GPT2MLP / BloomMLP)
    used_by_hf_arch:
      - GPT2LMHeadModel
      - BloomForCausalLM
    notes: legacy GELU FFN; rarely seen on Ascend deployments today.

  # ------------------------------------------------------------------------
  # 4. Hybrid FFN — alternating dense / MoE across layers (Qwen3-Next, …)
  # ------------------------------------------------------------------------
  hybrid_ffn:
    discriminator: |
      Same checkpoint mixes dense_swiglu and one of the MoE families on
      different layer indices, controlled by decoder_sparse_step or
      layer_types.
    detection_rule: |
      both moe.* and compute.matmul (without moe.*) appear in different
      layers of the same step.
    used_by_hf_arch:
      - Qwen3NextForCausalLM
      - Granite*Hybrid* (variants)
      - Lfm2MoeForCausalLM
      - NemotronHForCausalLM

# ----------------------------------------------------------------------------
# Block-head prefix kernels (NOT MoE-specific)
# ----------------------------------------------------------------------------
# HC* / MHC* prefixed kernels (HCPreSinkhorn, HCPreInvRMS, HCPost, MhcRmsNorm,
# …) are **structural block-head helpers** that prefix BOTH attention and
# MoE blocks in real DSV4 prefill traces. They MUST stay under
# ``block_head.mhc_prefix`` — earlier drafts of this skill tried to file
# them under ``moe.gating`` based on the assumption that they were
# internal to ``moe_gating_top_k``; that broke layers where the same
# prefix precedes attention.
#
# The "HC" prefix is **not** HCCL and **not** MoE-only.
not_moe_gating:
  kernels:
    - HCPreSinkhorn
    - HCPreInvRMS
    - HCPost
    - MhcRmsNorm
    - MhcAddRmsNorm
  classifies_as: block_head.mhc_prefix
  see_also:
    - knowledge/kernel_signatures.yaml entry ``hcprefix_blockhead``
